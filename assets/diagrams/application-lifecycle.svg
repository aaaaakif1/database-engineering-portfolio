<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="430" viewBox="0 0 1400 430">
<rect width="1400" height="430" fill="#f5f7fa"/>
<text x="700" y="48" text-anchor="middle" font-family="Arial" font-size="28" font-weight="700" fill="#17263a">Placement Application Lifecycle</text>
<defs><marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#526f8f"/></marker></defs>
<g font-family="Arial" text-anchor="middle">
<rect x="80" y="115" width="210" height="95" rx="14" fill="#ffffff" stroke="#263f5c" stroke-width="2"/><text x="185" y="150" font-size="18" font-weight="700" fill="#263f5c">Verified company</text><text x="185" y="245" font-size="14" fill="#334155">Company must be approved</text><text x="185" y="265" font-size="14" fill="#334155">before opportunities are</text><text x="185" y="285" font-size="14" fill="#334155">published.</text><rect x="340" y="115" width="210" height="95" rx="14" fill="#ffffff" stroke="#263f5c" stroke-width="2"/><text x="445" y="150" font-size="18" font-weight="700" fill="#263f5c">Job posting</text><text x="445" y="245" font-size="14" fill="#334155">A role is linked to one</text><text x="445" y="265" font-size="14" fill="#334155">company and includes a type</text><text x="445" y="285" font-size="14" fill="#334155">and closing date.</text><rect x="600" y="115" width="210" height="95" rx="14" fill="#ffffff" stroke="#263f5c" stroke-width="2"/><text x="705" y="150" font-size="18" font-weight="700" fill="#263f5c">Application</text><text x="705" y="245" font-size="14" fill="#334155">A student applies once to a</text><text x="705" y="265" font-size="14" fill="#334155">specific posting.</text><rect x="860" y="115" width="210" height="95" rx="14" fill="#ffffff" stroke="#263f5c" stroke-width="2"/><text x="965" y="150" font-size="18" font-weight="700" fill="#263f5c">Interview</text><text x="965" y="245" font-size="14" fill="#334155">Placement staff schedule and</text><text x="965" y="265" font-size="14" fill="#334155">record the outcome.</text><rect x="1120" y="115" width="210" height="95" rx="14" fill="#ffffff" stroke="#263f5c" stroke-width="2"/><text x="1225" y="150" font-size="18" font-weight="700" fill="#263f5c">Offer</text><text x="1225" y="245" font-size="14" fill="#334155">A successful interview may</text><text x="1225" y="265" font-size="14" fill="#334155">produce one offer.</text><line x1="290" y1="162" x2="335" y2="162" stroke="#526f8f" stroke-width="4" marker-end="url(#a)"/><line x1="550" y1="162" x2="595" y2="162" stroke="#526f8f" stroke-width="4" marker-end="url(#a)"/><line x1="810" y1="162" x2="855" y2="162" stroke="#526f8f" stroke-width="4" marker-end="url(#a)"/><line x1="1070" y1="162" x2="1115" y2="162" stroke="#526f8f" stroke-width="4" marker-end="url(#a)"/><text x="700" y="382" font-size="15" fill="#64748b">Business rules that require cross-table checks, such as preventing multiple final offers for one student, are identified for trigger or application-layer enforcement.</text></g></svg>